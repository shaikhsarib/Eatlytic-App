version: "3.8"

services:
  app:
    build: .
    container_name: eatlytic
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./data:/app/data
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DUCKDUCKGO_TIMEOUT=10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
