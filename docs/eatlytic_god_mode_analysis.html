  { id: 'codebase', label: '01 Codebase reality', render: renderCodebase },

  { id: 'market', label: '03 Market & customers', render: renderMarket },

  { id: 'verdict', label: '09 Verdict', render: renderVerdict },

function nav(id) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === id));
}

const navEl = document.getElementById('nav');
const pagesEl = document.getElementById('pages');
pages.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn'; btn.dataset.id = p.id; btn.textContent = p.label;
  btn.onclick = () => { nav(p.id); };
  navEl.appendChild(btn);

  const div = document.createElement('div');
  div.className = 'page'; div.id = p.id;
  div.innerHTML = p.render();
  pagesEl.appendChild(div);
});
nav('codebase');
