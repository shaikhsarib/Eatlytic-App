function renderYC() {

<div class="pitch-line" style="background:var(--color-background-secondary)">
  <p class="tel">"Eatlytic is the first nutrition scanner that mathematically audits every food label for lies — and personalizes safety verdicts using your DNA and blood sugar data."</p>
</div>

<div class="row2">
  <div class="card">
    <h3>What to answer for "What problem are you solving?"</h3>
    <p style="font-size:12px">India has 101 million diabetics — the world's highest burden. Every packaged food label they read could be mathematically wrong, and no existing app catches this. HealthifyMe tracks calories. Yuka scans barcodes. Neither validates the nutrition math, neither knows your genes, and neither connects your food to your actual blood sugar readings. We do all three.</p>
  </div>
  <div class="card">
    <h3>What to answer for "What's your moat?"</h3>
    <p style="font-size:12px">Every scan we process gets correlated with real CGM blood sugar data. In 6 months, we'll have India's first biosensor-validated food database — showing which specific Indian products cause glucose spikes in real bodies, not just on paper. That dataset cannot be bought, replicated, or scraped.</p>
  </div>
</div>

<div class="card">
  <h3>The YC demo video — exactly what to show (2 minutes)</h3>
  <ul class="check">
    <li>0:00–0:20 — Show the problem: hold up a Bournvita tin. "This says it's a 'health drink.' Here's what the math says."</li>
